<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USSD Code Gen</title>
  <link rel="stylesheet" href="style.css" />
  <script src="a9f3.js" defer></script>
</head>

<body>
  <main class="container">

    <!-- WE -->
    <section class="card" id="we-card">
      <h3>WE</h3>

      <div class="code-container">
        <input type="text" id="phone-we" placeholder="ادخل الرقم كامل" />
        <input type="text" id="amount-we" placeholder="المبلغ" />

        <div class="services-buttons">
          <button data-type="mobile-we">فاتورة موبايل</button>
          <button data-type="net-we">فاتورة انترنت</button>
          <button data-type="landline-we">فاتورة ارضي</button>
        </div>

        <div class="quick-actions">
          <button data-code="#688#">استعلام رقم</button>
          <button data-code="*7*1*2*100100#">استعلام محفظة</button>
        </div>
      </div>
    </section>

    <!-- Orange -->
    <section class="card" id="orange-card">
      <h3>Orange</h3>

      <div class="code-container">
        <input type="text" id="phone-orange" placeholder="ادخل الرقم كامل" />
        <input type="text" id="amount-orange" placeholder="المبلغ" />

        <div class="services-buttons">
          <button data-type="net-orange">فاتورة انترنت</button>
        </div>

        <div class="quick-actions">
          <button data-code="#119*1#">استعلام رقم</button>
          <button data-code="#7115*81*012012#">استعلام محفظة</button>
        </div>
      </div>
    </section>

  </main>
</body>
</html>
